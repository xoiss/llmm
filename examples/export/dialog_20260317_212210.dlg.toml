role = "assistant"
content = "Конечно! Вот пример кода на Python для утилиты командной строки, выполняющей четыре арифметических действия:\n\n```python\nimport argparse\n\ndef add(a, b):\n    return a + b\n\ndef subtract(a, b):\n    return a - b\n\ndef multiply(a, b):\n    return a * b\n\ndef divide(a, b):\n    if b == 0:\n        raise ValueError(\"Division by zero is not allowed\")\n    return a / b\n\ndef main():\n    parser = argparse.ArgumentParser(description='Simple command-line calculator.')\n    parser.add_argument('num1', type=float, help='First number')\n    parser.add_argument('num2', type=float, help='Second number')\n    parser.add_argument('operation', choices=['+', '-', '*', '/'], help='Operation to perform')\n\n    args = parser.parse_args()\n\n    operations = {\n        '+': add,\n        '-': subtract,\n        '*': multiply,\n        '/': divide\n    }\n\n    try:\n        result = operations[args.operation](args.num1, args.num2)\n        print(f'Result: {result}')\n    except ValueError as e:\n        print(f'Error: {e}')\n\nif __name__ == '__main__':\n    main()\n```\n\n**Как использовать:**\n1. Сохраните код в файл, например, `calculator.py`.\n2. Запустите утилиту из командной строки, передав два числа и операцию:\n   ```bash\n   python calculator.py 10 5 +\n   ```\n3. Результат будет выведен в консоль.\n\n**Примеры вызовов:**\n- `python calculator.py 10 5 +` → `Result: 15.0`\n- `python calculator.py 10 5 -` → `Result: 5.0`\n- `python calculator.py 10 5 *` → `Result: 50.0`\n- `python calculator.py 10 5 /` → `Result: 2.0`\n\nЕсли нужно адаптировать код под другой язык программирования — дайте знать!"
