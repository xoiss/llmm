content = "Привет! Для создания утилиты командной строки, выполняющей четыре арифметических действия (сложение, вычитание, умножение и деление), предлагаю следующий подход:\n\n1. **Определите структуру программы:**  \n   - основной модуль, который парсит аргументы командной строки;\n   - модуль с функциями для выполнения арифметических операций;\n   - модуль вывода результатов.\n\n2. **Используйте парсер аргументов** (например, `argparse` в Python) для обработки входных данных:\n   - два числа — операнды;\n   - символ операции (+, -, *, /).\n\n3. **Реализуйте функции для каждой операции:**\n   ```python\n   def add(a, b):\n       return a + b\n\n   def subtract(a, b):\n       return a - b\n\n   def multiply(a, b):\n       return a * b\n\n   def divide(a, b):\n       if b == 0:\n           raise ValueError(\"Division by zero is not allowed\")\n       return a / b\n   ```\n\n4. **Свяжите парсер с функциями:**  \n   В зависимости от переданного символа операции вызывайте соответствующую функцию.\n\n5. **Добавьте обработку ошибок:**\n   - проверка корректности ввода чисел;\n   - обработка деления на ноль;\n   - вывод понятного сообщения об ошибке.\n\n6. **Выведите результат** в консоль в формате, удобном для чтения.\n\n### Пример вызова утилиты\n```bash\npython calculator.py 10 5 +\n```\n**Результат:** `15`\n\n### Краткие шаги для реализации (на примере Python):\n1. Установите необходимые библиотеки (если нужно).\n2. Создайте файл `calculator.py`.\n3. Импортируйте `argparse`.\n4. Определите парсер и добавьте аргументы.\n5. Реализуйте функции арифметических операций.\n6. Напишите логику выбора операции и вызова функции.\n7. Добавьте обработку исключений.\n8. Выведите результат.\n\nЕсли нужна помощь с конкретным языком программирования или этапом разработки — дайте знать!"
