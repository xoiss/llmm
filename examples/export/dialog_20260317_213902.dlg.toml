 ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],\n        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],\n        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],\n        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],\n        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],\n        [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],\n        ['H', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ']  # H — домик (в левом нижнем углу)\n    ]\n\n    moves_left = 20  # Увеличенный лимит ходов для большой сетки\n    creature = 'D'\n    home = 'H'\n\n    print(\"Добро пожаловать в «Магические пути»!\")\n    print(\"Управляйте дракончиком (D), чтобы добраться до домика (H).\")\n    print(\"Используйте команды: 'вверх', 'вниз', 'влево', 'вправо'.\")\n    print(f\"У вас есть {moves_left} ходов.\\n\")\n\n    while moves_left > 0:\n        print_board(board)\n        print(f\"Осталось ходов: {moves_left}\")\n\n        if check_win(board, creature, home):\n            print(\"Поздравляем! Дракончик добрался до домика!\")\n            break\n\n        move = input(\"Ваш ход: \").strip().lower()\n\n        dx, dy = 0, 0\n        if move == 'вверх':\n            dx = -1\n        elif move == 'вниз':\n            dx = 1\n        elif move == 'влево':\n            dy = -1\n        elif move == 'вправо':\n            dy = 1\n        else:\n            print(\"Неверная команда! Используйте: 'вверх', 'вниз', 'влево', 'вправо'.\\n\")\n            continue\n\n        if move_creature(board, creature, dx, dy):\n            moves_left -= 1\n        else:\n            print(\"Нельзя сделать такой ход! На пути препятствие.\\n\")\n\n    if not check_win(board, creature, home):\n        print(\"Игра окончена. Дракончик не успел добраться до домика.\")\n\nif __name__ == \"__main__\":\n    main()\n```\n\n### Что изменилось\n\n1. **Размер поля:** сетка теперь 12×12 (вместо 3×3).\n2. **Стартовая позиция дракончика (D):** правый верхний угол.\n3. **Позиция домика (H):** левый нижний угол.\n4. **Лимит ходов:** увеличен до 20, чтобы учесть больший размер поля.\n5. **Препятствия (X):** в базовой версии их нет, но вы можете добавить вручную в массив `board`, если нужно усложнить задачу.\n\n### Как добавить препятствия\n\nЧтобы усложнить игру, вставьте `'X'` в нужные ячейки массива `board`. Например:\n\n```python\nboard[3][5] = 'X'  # Препятствие в 4-й строке, 6-м столбце\nboard[7][8] = 'X'  # Ещё одно препятствие\n```\n\n### Дальнейшие улучшения\n\n- сгенерировать случайные уровни с препятствиями;\n- добавить счётчик шагов до цели (например, минимальное количество ходов до домика);\n- реализовать несколько уровней с возрастающей сложностью;\n- ввести дополнительные элементы (порталы, рычаги) — потребуется доработка логики.\n\nЕсли хотите что-то изменить или добавить — дайте знать, я помогу!"
