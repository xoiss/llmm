[[messages]]
role = "assistant"
content = "Конечно! Ниже — упрощённый пример кода на Python для консольной игры-головоломки «Магические пути». Это базовая версия с одним уровнем (сетка 3×3), где игрок перемещает дракончика к домику, избегая препятствий.\n\n### Код\n\n```python\ndef print_board(board):\n    \"\"\"Выводит текущее состояние игрового поля.\"\"\"\n    for row in board:\n        print(' '.join(row))\n    print()\n\ndef is_valid_move(board, x, y):\n    \"\"\"Проверяет, можно ли сделать ход в указанную клетку.\"\"\"\n    rows, cols = len(board), len(board[0])\n    return 0 <= x < rows and 0 <= y < cols and board[x][y] != 'X'\n\ndef move_creature(board, creature, dx, dy):\n    \"\"\"Перемещает существо на одну клетку в заданном направлении.\"\"\"\n    for i in range(len(board)):\n        for j in range(len(board[i])):\n            if board[i][j] == creature:\n                new_x, new_y = i + dx, j + dy\n                if is_valid_move(board, new_x, new_y):\n                    board[i][j], board[new_x][new_y] = board[new_x][new_y], board[i][j]\n                    return True\n    return False\n\ndef check_win(board, creature, home):\n    \"\"\"Проверяет, достиг ли дракончик своего домика.\"\"\"\n    creature_pos = None\n    home_pos = None\n\n    for i in range(len(board)):\n        for j in range(len(board[i])):\n            if board[i][j] == creature:\n                creature_pos = (i, j)\n            if board[i][j] == home:\n                home_pos = (i, j)\n\n    return creature_pos == home_pos\n\ndef main():\n    # Инициализация игрового поля (3x3)\n    board = [\n        ['D', ' ', ' '],  # D - дракончик\n        [' ', 'X', ' '],  # X - препятствие (камень)\n        ['H', ' ', ' ']   # H - домик\n    ]\n\n    moves_left = 4  # Лимит ходов\n    creature = 'D'\n    home = 'H'\n\n    print(\"Добро пожаловать в «Магические пути»!\")\n    print(\"Управляйте дракончиком (D), чтобы добраться до домика (H).\")\n    print(\"Используйте команды: 'вверх', 'вниз', 'влево', 'вправо'.\")\n    print(f\"У вас есть {moves_left} ходов.\\n\")\n\n    while moves_left > 0:\n        print_board(board)\n        print(f\"Осталось ходов: {moves_left}\")\n\n        if check_win(board, creature, home):\n            print(\"Поздравляем! Дракончик добрался до домика!\")\n            break\n\n        move = input(\"Ваш ход: \").strip().lower()\n\n        dx, dy = 0, 0\n        if move == 'вверх':\n            dx = -1\n        elif move == 'вниз':\n            dx = 1\n        elif move == 'влево':\n            dy = -1\n        elif move == 'вправо':\n            dy = 1\n        else:\n            print(\"Неверная команда! Используйте: 'вверх', 'вниз', 'влево', 'вправо'.\\n\")\n            continue\n\n        if move_creature(board, creature, dx, dy):\n            moves_left -= 1\n        else:\n            print(\"Нельзя сделать такой ход! На пути препятствие.\\n\")\n\n    if not check_win(board, creature, home):\n        print(\"Игра окончена. Дракончик не успел добраться до домика.\")\n\nif __name__ == \"__main__\":\n    main()\n```\n\n### Как работает код\n\n1. **`print_board(board)`** — выводит текущее состояние поля.\n2. **`is_valid_move(board, x, y)`** — проверяет, можно ли переместиться в клетку `(x, y)` (не выходит ли за границы поля и нет ли препятствия).\n3. **`move_creature(board, creature, dx, dy)`** — перемещает дракончика (`creature`) на одну клетку по осям `dx` и `dy`, если ход допустим.\n4. **`check_win(board, creature, home)`** — определяет, достиг ли дракончик домика.\n5. **`main()`** — основная функция, которая:\n   - задаёт начальную конфигурацию поля;\n   - ограничивает количество ходов;\n   - обрабатывает ввод пользователя;\n   - проверяет условия победы/поражения.\n\n### Что можно улучшить\n\n- добавить несколько уровней с разной сложностью;\n- реализовать систему подсказок;\n- расширить набор существ и препятствий;\n- улучшить интерфейс (например, добавить счётчик шагов до цели).\n\nЕсли нужно что-то изменить или добавить — дайте знать, я помогу доработать код!"
